<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>修改密码</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../css/oksub.css?v=2.6.1">
    <script type="text/javascript" src="../../lib/loading/okLoading.js?v=2.6.1"></script>
	<script type="text/javascript" src="../../js/common.js?v=2.6.1"></script>
	<script type="text/javascript" src="../../lib/jquery-1.12.4.min.js?v=2.6.1"></script>
	<style> 		
		.location {position: absolute;right: 10px;bottom: 2px;}
	</style>
</head>
<body class="childrenBody seting-pass">
<form class="layui-form changePwd" id="uppwd_from" >
	<div class="layui-form-item">
		<label class="layui-form-label">用户名</label>
		<div class="layui-input-block">
			<input type="text" id="text_name" disabled class="layui-input layui-disabled">
			<input type="hidden" name="ID" id="ID" />
		</div>
	</div>
	<div class="layui-form-item">
		<label class="layui-form-label">旧密码</label>
		<div class="layui-input-block">
			<input type="password" value="" placeholder="请输入旧密码" lay-verify="required|oldPwds" class="layui-input pwd">
		</div>
	</div>
	<div class="layui-form-item">
		<label class="layui-form-label">新密码</label>
		<div class="layui-input-block">
			<input type="password" value="" placeholder="请输入新密码" name="PASSWORD" id="oldPwd" lay-verify="required|password"  class="layui-input pwd">
		</div>
	</div>
	<div class="layui-form-item">
		<label class="layui-form-label">确认密码</label>
		<div class="layui-input-block">
			<input type="password" value="" placeholder="请确认密码" lay-verify="required|confirmPwd" class="layui-input pwd">
		</div>
	</div>
	<div class="layui-form-item location">
		<div class="layui-input-block">
			<button class="layui-btn" lay-submit="" lay-filter="changePwd">立即修改</button>
			<button type="submit" class="layui-btn layui-btn-primary">重置</button>
		</div>
	</div>
</form>
<script type="text/javascript" src="../../lib/layui/layui.js?v=2.6.1"></script>
<script type="text/javascript" src="user-pwd.js?v=2.6.1"></script>
</body>
</html>
