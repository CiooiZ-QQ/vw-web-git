					<div class="content-main">
						<div class="content-main-item">

							</div>
							<div class="content-main-item-list" data-type="brand">

						</div>
						<div class="content-main-item" style="margin-left: 6%;">
							<div class="content-main-item-top">
								<div class="content-main-item-title" >

					<div class="content-top"><p class="text-shadow-def">Competitiveness Forecasting</p></div>
					<div class="content-score">
