	//验证用户是否操作(验证方式本页面是否点击)
	function hasOperate(callback, second) { //second是检测未操作的时间，秒为单位，callback是该时间段未点击需要执行的函数
		var status = true, timer;
		document.body.onmousedown = function()  {status = true; }
		document.body.onmouseup = function() { countTime(); }
		function countTime() {
			setInterval(function() { if (!status) { callback(); status = true; } }, 1);
			if (timer) clearInterval(timer);
			timer = setInterval(function() { status = false; }, second * 1000);
		}
		countTime();
	}
	
	//用户离开浏览器或选项卡清理缓存
	window.onbeforeunload = function() { beginTime = new Date().getTime(); };
	//通过执行时间差判断刷新还是关闭
	var beginTime = 0; //执行onbeforeunload的开始时间
	var differTime = 0; //时间差
	window.onunload = function() {
		differTime = new Date().getTime() - beginTime;
		if (differTime <= 5) { localStorage.removeItem(g_accr_login_info); }
	};

	//监听子页面退出登录方法
	var us_id = localStorage.getItem(g_accr_auth_usid);
	if (us_id == null) {
		g_f_localstorage_clear();
		location.replace(g_req_login_url);
	}

	function log_off() {
		g_f_localstorage_clear();
		location.replace('../' + g_req_login_url);
	};

	function reinitIframe(id) {
		var thisHeight = $(id).contents().find("html").height() + 2; 
		//console.log('thisHeight',(thisHeight == 0 ? 'inherit' : thisHeight));
		$(id).css('height', (thisHeight == 0 ? 'inherit' : thisHeight));
	};
